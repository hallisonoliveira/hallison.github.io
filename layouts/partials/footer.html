<footer class="w-full mt-24 bg-secondary-fixed dark:bg-tertiary-container">
  <div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 w-full max-w-screen-2xl mx-auto">

    <div class="flex flex-col items-center md:items-start gap-4">
      <div class="font-headline font-bold text-primary-container dark:text-primary-fixed text-xl">
        {{ .Site.Params.siteName }}
      </div>
      <p class="font-body text-lg italic text-primary dark:text-primary-fixed text-center md:text-left">
        © {{ now.Year }} {{ .Site.Params.siteName }}. {{ i18n "footer_tagline" }}
      </p>
    </div>

    <div class="flex flex-wrap justify-center gap-8 mt-8 md:mt-0">
      <a class="font-body text-lg italic text-primary dark:text-primary-fixed opacity-80 hover:opacity-100 transition-all" href="{{ relLangURL "/privacy/" }}">
        {{ i18n "footer_privacy" }}
      </a>
      <a class="font-body text-lg italic text-primary dark:text-primary-fixed opacity-80 hover:opacity-100 transition-all" href="{{ relLangURL "/terms/" }}">
        {{ i18n "footer_terms" }}
      </a>
    </div>

  </div>
</footer>
